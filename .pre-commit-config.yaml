# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-added-large-files
    -   id: check-yaml

-   repo: local
    hooks:
    -   id: uv-lock-check
        name: uv.lock is in sync with pyproject.toml
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
    -   id: uv-export-main
        name: Regenerate requirements.txt
        entry: uv export --format requirements-txt --no-dev --no-group analysis --no-group scripts -o requirements.txt
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
    -   id: uv-export-dev
        name: Regenerate requirements-dev.txt
        entry: uv export --format requirements-txt --only-group dev -o requirements-dev.txt
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
